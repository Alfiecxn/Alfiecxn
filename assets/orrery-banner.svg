<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" role="img" aria-label="Alfie Coxon — governed multi-agent AI systems" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1f"/>
      <stop offset="0.55" stop-color="#0e1430"/>
      <stop offset="1" stop-color="#0a0d1c"/>
    </linearGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#8ff0e3"/>
      <stop offset="1" stop-color="#1fae9c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3a4a86" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3a4a86" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f43f5e"/>
      <stop offset="1" stop-color="#6aa6ff"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="0" y="0" width="1280" height="320" rx="22" fill="url(#bg)"/>
  <rect x="0.75" y="0.75" width="1278.5" height="318.5" rx="21.25" fill="none" stroke="#2a3566" stroke-opacity="0.6"/>

  <!-- faint starfield -->
  <g fill="#9fb2ff">
    <circle cx="760" cy="48" r="1.3" opacity="0.5"><animate attributeName="opacity" values="0.15;0.7;0.15" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="90" r="1" opacity="0.4"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="5.5s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="60" r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="250" r="1" opacity="0.35"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="6s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="270" r="1.1" opacity="0.4"><animate attributeName="opacity" values="0.15;0.6;0.15" dur="4.8s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="210" r="0.9" opacity="0.3"/>
  </g>

  <!-- ============ THE ORRERY ============ -->
  <g transform="translate(300 160)">
    <circle cx="0" cy="0" r="170" fill="url(#glow)"/>

    <!-- orbit rings -->
    <g fill="none" stroke="#43508c" stroke-opacity="0.55">
      <circle cx="0" cy="0" r="62"/>
      <circle cx="0" cy="0" r="104"/>
      <circle cx="0" cy="0" r="146"/>
    </g>

    <!-- governed core (the human gate) -->
    <circle cx="0" cy="0" r="30" fill="url(#core)">
      <animate attributeName="opacity" values="0.75;1;0.75" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="0" r="7.5" fill="#eafffb"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#8ff0e3" stroke-opacity="0.7">
      <animate attributeName="r" values="14;30;14" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="stroke-opacity" values="0.7;0;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- orbiting agents / model tiers -->
    <g>
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="9s" repeatCount="indefinite"/>
      <circle cx="62" cy="0" r="6.5" fill="#38e1c4"/>
      <circle cx="62" cy="0" r="12" fill="#38e1c4" opacity="0.18"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="16s" repeatCount="indefinite"/>
      <circle cx="104" cy="0" r="7.5" fill="#f6b64a"/>
      <circle cx="104" cy="0" r="13" fill="#f6b64a" opacity="0.16"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="140 0 0" to="500 0 0" dur="24s" repeatCount="indefinite"/>
      <circle cx="146" cy="0" r="6" fill="#a78bfa"/>
      <circle cx="146" cy="0" r="11" fill="#a78bfa" opacity="0.16"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="rotate" from="250 0 0" to="610 0 0" dur="24s" repeatCount="indefinite"/>
      <circle cx="146" cy="0" r="5" fill="#6aa6ff"/>
    </g>
  </g>

  <!-- ============ WORDMARK ============ -->
  <g transform="translate(560 0)">
    <text x="0" y="132" fill="#f4f7ff" font-size="60" font-weight="700" letter-spacing="1.5">Alfie Coxon</text>
    <rect x="3" y="152" width="66" height="4" rx="2" fill="url(#accent)"/>
    <text x="0" y="192" fill="#f43f5e" font-size="27" font-weight="600" letter-spacing="0.4">Governed multi-agent AI systems</text>
    <text x="0" y="228" fill="#93a4d8" font-size="17" font-weight="400" letter-spacing="3.2">ORCHESTRATE · ROUTE · RUN · WATCH · VERIFY</text>
  </g>
</svg>
